services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "lan_root_pass"
      MARIADB_DATABASE: "lan_catering"
      MARIADB_USER: "catering"
      MARIADB_PASSWORD: "catering123"
    ports:
      # Host port 3307 -> container port 3306 (avoid clash with local MySQL on 3306)
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mariadb_data:
